<!DOCTYPE html>
<html>
<head>
    <title>AutoReport</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #2c3e50;
        }

        .box {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .item {
            margin: 8px 0;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>📊 AutoReport Summary</h1>

<div class="box">

    <div class="item"><b>Generated At:</b> {{ generated_at }}</div>
    <div class="item"><b>Total Records:</b> {{ total_records }}</div>
    <div class="item"><b>Total Sales:</b> {{ total_sales }}</div>
    <div class="item"><b>Average Sales:</b> {{ average_sales }}</div>
    <div class="item"><b>Minimum Sales:</b> {{ min_sales }}</div>
    <div class="item"><b>Maximum Sales:</b> {{ max_sales }}</div>

</div>

</body>
</html>
